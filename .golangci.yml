# golangci-lint v2 configuration
# See https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  # Build tags used in the project (currently none).
  # build-tags: []
  # Allow the linter to operate on test files.
  tests: true

linters:
  # Use the v2 standard set (errcheck, govet, ineffassign, staticcheck, unused)
  # and add the two extras agreed during the CI bootstrap:
  #   - gosec: security-focused issues (SQL injection patterns, weak crypto, etc.)
  #   - revive: replaces deprecated golint with a modern, configurable rule set
  default: standard
  enable:
    - gosec
    - revive

  settings:
    gosec:
      # Severity threshold for issues to be reported. low|medium|high.
      severity: medium
      # Confidence threshold for issues to be reported.
      confidence: medium
      # Globally suppressed rules. Keep this list short and explain each entry.
      excludes:
        # G104: Errors unhandled. Many call sites use `defer rows.Close()` and
        # similar where the returned error is intentionally ignored. The codebase
        # uses explicit `// #nosec G104` comments where this is genuinely safe;
        # gating it globally here keeps the noise down.
        - G104
    revive:
      # Use revive's default rules. Tighten later as the codebase tolerates it.
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
          disabled: true  # Too noisy for handler-style code; revisit later.
        - name: unreachable-code
        - name: redefines-builtin-id

  # Files / paths to skip per linter.
  exclusions:
    # Use the predefined "lax" preset to ignore false positives from common
    # patterns (table-driven tests, test fixtures, etc.).
    presets:
      - common-false-positives
    rules:
      # Test harness and debugging utilities are not production code paths.
      # gosec findings there are typically about hardcoded sample credentials
      # and intentionally insecure connection strings used to probe failure
      # modes. Excluded to match the prior security-scans.yml policy.
      - path: ^test/
        linters:
          - gosec
      - path: ^debug/
        linters:
          - gosec
      # Generated or vendored files (none today, but keep the rule in place).
      - path: ^website/
        linters:
          - gosec
          - revive
          - errcheck
          - govet
          - ineffassign
          - staticcheck
          - unused
