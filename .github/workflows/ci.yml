name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

# Cancel any in-progress runs of this workflow on the same ref. Saves CI minutes
# when several pushes land in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required for only-new-issues to work reliably.
          # Without it, golangci-lint often reports false "new" issues or
          # fails to compute the diff correctly on pushes.
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.0
          # Config lives at .golangci.yml in the repo root.
          only-new-issues: true

  test:
    name: Test (race + coverage)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Go mod tidy check
        run: |
          # Fail if go.mod or go.sum would change after `go mod tidy`. This
          # catches unintended dependency drift in PRs.
          go mod tidy
          git diff --exit-code go.mod go.sum || (
            echo "::error::go.mod / go.sum are not tidy. Run 'go mod tidy' locally and commit the result." && exit 1
          )

      - name: Build
        run: go build ./...

      - name: Run tests with race detector and coverage
        # -race catches data races in pendingOps / dbMu / dynamic connections.
        # -coverprofile produces a profile we upload as an artifact for inspection.
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tail -n 20

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  security:
    name: Security (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # We exclude the winsspi package because it is Windows-only and
        # govulncheck on Linux runners cannot load it (even with build tags).
        # This is a well-known limitation with github.com/microsoft/go-mssqldb.
        run: |
          govulncheck $(go list ./... | grep -v 'integratedauth/winsspi')
