name: Security scans

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ master ]

jobs:
  security:
    name: Run govulncheck and gosec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run govulncheck
        run: |
          govulncheck ./...

      - name: Run gosec
        run: |
          # Exclude test/debug/tool utility directories from security scanning
          # These contain test harnesses and debug tools, not production code
          gosec -exclude-dir=test -exclude-dir=debug -exclude-dir=tools ./...

      - name: Run tests
        run: |
          go test ./...
