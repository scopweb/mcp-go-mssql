name: Security scans

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

# Lightweight security-only workflow.
# The full CI (lint + tests + govulncheck) lives in ci.yml.
# This one is kept for quick security signal on PRs that touch sensitive areas.

jobs:
  security:
    name: Security (govulncheck + gosec)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run govulncheck
        # Works cleanly thanks to integrated_auth_windows.go (//go:build windows).
        run: govulncheck ./...

      - name: Run gosec
        run: |
          # Exclude non-production directories (test harnesses, examples, docs, scripts).
          # These intentionally contain patterns that would otherwise trigger findings.
          gosec -tests=false \
            -exclude-dir=test \
            -exclude-dir=scripts \
            -exclude-dir=website \
            -exclude-dir=examples \
            ./...

      - name: Run tests
        run: go test ./...
